version: 2.1

# ============================================================
# CI Performance Demo: Property-Based Testing with fast-check
#
# このデモでは resource_class と parallelism を変えることで
# PBT のテスト実行速度の違いを体感できます。
#
# テスト負荷の調整:
#   src/test/*.pbt.test.ts(x) の NUM_RUNS を変更
#   - 標準:   NUM_RUNS = 100
#   - 高負荷: NUM_RUNS = 1000 (デフォルト)
#   - 超高負荷: NUM_RUNS = 10000
#
# Test Insights の確認:
#   CircleCI UI → Project → Tests タブ
#   junit.xml が store_test_results で取り込まれ、
#   テストごとの実行時間・失敗傾向が可視化されます。
# ============================================================

orbs:
  node: circleci/node@7

# ── Executors ────────────────────────────────────────────────
executors:
  # Small: 1 vCPU / 2GB RAM  → PBT が重い場合に明確に遅い
  node-small:
    docker:
      - image: cimg/node:22.14
    resource_class: small

  # Medium: 2 vCPU / 4GB RAM  → デフォルト
  node-medium:
    docker:
      - image: cimg/node:22.14
    resource_class: medium

  # Large: 4 vCPU / 8GB RAM  → parallelism との組み合わせで効果大
  node-large:
    docker:
      - image: cimg/node:22.14
    resource_class: large

# ── Commands ─────────────────────────────────────────────────
commands:
  install-deps:
    steps:
      - run:
          name: Enable Corepack & install pnpm
          command: |
            corepack enable
            corepack prepare pnpm@10.32.1 --activate
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install dependencies (pnpm ci)
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
            - node_modules

  run-tests-and-store:
    parameters:
      label:
        type: string
    steps:
      - run:
          name: Run PBT << parameters.label >>
          # CI=true により vite.config.ts の junit レポーターが有効になる
          # test-results/junit.xml に JUnit XML が出力される
          command: pnpm run test:ci
      - store_test_results:
          # CircleCI Test Insights が junit.xml を自動検出する
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

# ── Jobs ─────────────────────────────────────────────────────
jobs:
  # ── [1] Small resource class, no parallelism ─────────────────
  test-small:
    executor: node-small
    parallelism: 1
    steps:
      - checkout
      - install-deps
      - run-tests-and-store:
          label: "(small / parallelism=1)"

  # ── [2] Medium resource class, no parallelism ────────────────
  test-medium:
    executor: node-medium
    parallelism: 1
    steps:
      - checkout
      - install-deps
      - run-tests-and-store:
          label: "(medium / parallelism=1)"

  # ── [3] Large resource class, no parallelism ─────────────────
  test-large:
    executor: node-large
    parallelism: 1
    steps:
      - checkout
      - install-deps
      - run-tests-and-store:
          label: "(large / parallelism=1)"

  # ── [4] Medium resource class, parallelism=4 ─────────────────
  # CircleCI の test splitting を使って並列実行
  # timings による分割で各ノードの実行時間を均等化
  test-medium-parallel:
    executor: node-medium
    parallelism: 4
    steps:
      - checkout
      - install-deps
      - run:
          name: Run PBT (medium / parallelism=4) with test splitting
          command: |
            mkdir -p test-results
            # タイミングデータで分割 (初回は名前で均等分割)
            TESTFILES=$(circleci tests glob "src/test/**/*.test.{ts,tsx}" | \
              circleci tests split --split-by=timings)
            # ノード番号をファイル名に含めて各ノードの結果を区別
            CI=true pnpm exec vitest run $TESTFILES \
              --reporter=verbose \
              --reporter=junit \
              --outputFile.junit="test-results/junit-${CIRCLE_NODE_INDEX}.xml"
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

# ── Workflows ────────────────────────────────────────────────
workflows:
  # [A] デフォルト: Medium のみ実行 (通常の CI)
  default:
    jobs:
      - test-medium

  # [B] パフォーマンス比較デモ: 全バリエーションを並列実行
  #     performance-demo ブランチへの push で起動
  performance-comparison:
    when:
      equal: [performance-demo, << pipeline.git.branch >>]
    jobs:
      - test-small
      - test-medium
      - test-large
      - test-medium-parallel
